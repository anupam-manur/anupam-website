project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "**/*.qmd"
  resources:
    - robots.txt
    - llms.txt
    - CNAME

website:
  title: "Anupam Manur"
  description: "Economics professor, author, and policy researcher"
  site-url: https://anupammanur.com

  navbar:
    background: "#F2F5F2"
    foreground: "#ffffff"
    left:
      - text: "Home"
        href: index.qmd
      - text: "Writing"
        menu:
          - text: "Op-eds"
            href: op-eds/index.qmd
          - text: "Publications"
            href: publications/index.qmd
          - text: "Blog"
            href: blog/index.qmd
      - text: "Books"
        href: books.qmd
      - text: "Media"
        href: media.qmd
      - text: "Courses"
        href: courses.qmd
      - text: "IPPR"
        href: ippr.qmd
    right:
      - icon: rss
        href: blog/index.xml
        aria-label: RSS Feed
      - icon: twitter
        href: https://twitter.com/anupammanur
        aria-label: Twitter
      - icon: linkedin
        href: https://linkedin.com/in/anupam-manur
        aria-label: LinkedIn

  page-footer:
    left: |
      &copy; 2025 Anupam Manur
    center: |
      Made with [Quarto](https://quarto.org)
    right: |
      [Blog via RSS](blog/index.xml)

  favicon: images/favicon.png

  search: true

  open-graph:
    title: "Anupam Manur"
    description: "Economics professor, author, and policy researcher at the Takshashila Institution. Research on economic policy, trade, platform economics, and bioeconomy."
    image: images/anupam-profile.jpeg
    site-name: "Anupam Manur"

  twitter-card:
    title: "Anupam Manur"
    description: "Economics professor, author, and policy researcher at the Takshashila Institution. Research on economic policy, trade, platform economics, and bioeconomy."
    image: images/anupam-profile.jpeg
    card-style: summary_large_image
    creator: "@anupammanur"

format:
  html:
    theme:
      light: [cosmo, styles.scss]
    toc: true
    toc-depth: 3
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    mainfont: "DM Sans"
    monofont: "JetBrains Mono"
